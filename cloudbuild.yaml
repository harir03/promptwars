steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venuepulse:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venuepulse:latest'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/venuepulse:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/venuepulse:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'venuepulse'
      - '--image'
      - 'gcr.io/$PROJECT_ID/venuepulse:$SHORT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--timeout'
      - '300s'
      - '--set-env-vars'
      - 'ENVIRONMENT=production'
      - '--update-secrets'
      - 'GOOGLE_API_KEY=venuepulse-gemini-key:latest,ADMIN_PASSKEY=venuepulse-admin-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/venuepulse:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/venuepulse:latest'

options:
  logging: CLOUD_LOGGING_ONLY
