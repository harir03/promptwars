<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="VenuePulse — AI-powered venue intelligence for real-time crowd management, predictive surge alerts, and gamified crowd redistribution." />
    <meta name="theme-color" content="#14b8a6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Google Analytics (gtag.js) — Venue usage analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VENUEPULSE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VENUEPULSE', {
        page_title: document.title,
        send_page_view: true,
        cookie_flags: 'SameSite=None;Secure',
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
